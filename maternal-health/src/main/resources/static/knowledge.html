<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>孕育百科</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); padding: 20px; font-family: "Microsoft YaHei"; }
        .container { max-width: 800px; margin: 0 auto; }

        .search-bar { position: relative; margin-bottom: 20px; }
        .search-input { border-radius: 25px; padding-left: 40px; border: 1px solid #eee; height: 45px; }
        .search-icon { position: absolute; left: 15px; top: 14px; color: #999; }

        .cate-nav { white-space: nowrap; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
        .cate-item {
            display: inline-block; padding: 5px 15px; background: #fff; border-radius: 20px;
            margin-right: 10px; color: #666; cursor: pointer; transition: all 0.3s; font-size: 14px;
        }
        .cate-item.active { background: #ff5ca0; color: white; box-shadow: 0 3px 10px rgba(255, 92, 160, 0.3); }

        .article-card {
            background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.2s;
        }
        .article-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }

        .art-tag { font-size: 12px; color: #ff5ca0; background: #fff0f5; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        .art-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .art-desc { color: #888; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
        .art-meta { margin-top: 10px; font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; align-items:center; margin-bottom:20px;">
        <a href="index_pregnant.html" class="layui-btn layui-btn-sm layui-btn-primary" style="border-radius:15px; margin-right:15px;"><i class="fa fa-arrow-left"></i> 返回</a>
        <h2 style="font-weight:bold; color:#333;">📚 孕育百科</h2>
    </div>

    <div class="search-bar">
        <i class="fa fa-search search-icon"></i>
        <input type="text" id="searchInput" class="layui-input search-input" placeholder="搜索感兴趣的知识...">
    </div>

    <div class="cate-nav">
        <span class="cate-item active" data-cate="全部">全部</span>
        <span class="cate-item" data-cate="孕期营养">孕期营养</span>
        <span class="cate-item" data-cate="产检科普">产检科普</span>
        <span class="cate-item" data-cate="分娩知识">分娩知识</span>
        <span class="cate-item" data-cate="产后护理">产后护理</span>
        <span class="cate-item" data-cate="育儿指南">育儿指南</span>
    </div>

    <div id="artList">
    </div>
</div>

<script src="https://cdn.staticfile.org/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>
<script>
    // 加载列表
    function loadList(category, keyword) {
        axios.get('http://localhost:8080/api/knowledge/list', {
            params: { category: category, keyword: keyword }
        }).then(res => {
            var list = res.data.data;
            var html = '';
            if(list.length === 0) {
                html = '<div style="text-align:center; padding:50px; color:#ccc;">暂无相关文章</div>';
            } else {
                list.forEach(item => {
                    // 截取一部分内容作为摘要
                    var desc = item.content.substring(0, 60) + '...';
                    html += `
                    <div class="article-card" onclick="window.location.href='knowledge_detail.html?id=${item.kbId}'">
                        <div class="art-title">
                            <span class="art-tag">${item.category}</span>${item.title}
                        </div>
                        <div class="art-desc">${desc}</div>
                        <div class="art-meta">
                            <span><i class="fa fa-eye"></i> ${item.viewCount} 阅读</span>
                            <span>${item.createTime.split('T')[0]}</span>
                        </div>
                    </div>`;
                });
            }
            $('#artList').html(html);
        });
    }

    loadList('全部', '');

    // 分类点击
    $('.cate-item').click(function(){
        $('.cate-item').removeClass('active');
        $(this).addClass('active');
        loadList($(this).data('cate'), $('#searchInput').val());
    });

    // 搜索输入
    $('#searchInput').on('input', function(){
        loadList($('.cate-item.active').data('cate'), $(this).val());
    });
</script>
</body>
</html>
