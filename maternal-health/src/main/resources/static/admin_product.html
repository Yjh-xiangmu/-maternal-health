<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>商品管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <style>
        body { padding: 15px; }
        .thumb-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        .layui-upload-img { width: 100px; height: 100px; object-fit: cover; margin-top: 10px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div class="layui-card">
    <div class="layui-card-body">
        <button class="layui-btn layui-bg-blue" id="btnAdd"><i class="layui-icon">&#xe654;</i> 新增商品</button>
    </div>
</div>

<table id="productTable" lay-filter="productTable"></table>

<script type="text/html" id="imgTpl">
    <img src="{{d.coverImg}}" class="thumb-img" onclick="previewImg('{{d.coverImg}}')">
</script>

<script type="text/html" id="statusTpl">
    <input type="checkbox" name="status" value="{{d.productId}}" lay-skin="switch" lay-text="上架|下架" lay-filter="statusSwitch" {{ d.status == 1 ? 'checked' : '' }}>
</script>

<script type="text/html" id="toolBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<div id="productForm" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="formVal">
        <input type="hidden" name="productId">
        <div class="layui-form-item">
            <label class="layui-form-label">商品名称</label>
            <div class="layui-input-block">
                <input type="text" name="productName" required lay-verify="required" placeholder="请输入商品名称" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分类</label>
            <div class="layui-input-block">
                <select name="category">
                    <option value="孕妈用品">孕妈用品</option>
                    <option value="宝宝洗护">宝宝洗护</option>
                    <option value="营养辅食">营养辅食</option>
                    <option value="玩具">玩具</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">价格 (元)</label>
            <div class="layui-input-block">
                <input type="number" name="price" required lay-verify="required" placeholder="99.00" class="layui-input">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">封面图</label>
            <div class="layui-input-block">
                <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="uploadBtn">
                    <i class="layui-icon">&#xe67c;</i> 上传图片
                </button>
                <div class="layui-upload-list">
                    <img class="layui-upload-img" id="previewImg" src="">
                    <p id="demoText"></p>
                </div>
                <input type="hidden" name="coverImg" id="coverImgInput">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="上架" checked>
                <input type="radio" name="status" value="0" title="下架">
            </div>
        </div>

        <div class="layui-form-item" style="text-align: right;">
            <button class="layui-btn" lay-submit lay-filter="saveSubmit">保存提交</button>
        </div>
    </form>
</div>

<script src="https://cdn.staticfile.org/layui/2.9.11/layui.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>

<script>
    layui.use(['table', 'form', 'upload', 'layer'], function(){
        var table = layui.table;
        var form = layui.form;
        var upload = layui.upload;
        var layer = layui.layer;
        var $ = layui.$;

        // 1. 渲染表格
        var tableIns = table.render({
            elem: '#productTable',
            url: 'http://localhost:8080/api/admin/product/list',
            cols: [[
                {field: 'productId', title: 'ID', width: 60, sort: true},
                {field: 'coverImg', title: '图片', width: 80, templet: '#imgTpl', align: 'center'},
                {field: 'productName', title: '商品名称', width: 200},
                {field: 'category', title: '分类', width: 100, sort: true},
                {field: 'price', title: '价格', width: 100, style:'color:#ff5722; font-weight:bold;'},
                {field: 'status', title: '状态', width: 100, templet: '#statusTpl', align: 'center'},
                {title: '操作', width: 150, toolbar: '#toolBar', align: 'center'}
            ]],
            page: true
        });

        // 2. 图片上传
        upload.render({
            elem: '#uploadBtn',
            url: 'http://localhost:8080/api/file/upload', // 上传接口
            done: function(res){
                if(res.code === 200){
                    $('#previewImg').attr('src', res.data.src);
                    $('#coverImgInput').val(res.data.src); // 存入隐藏域
                    layer.msg('上传成功');
                } else {
                    layer.msg('上传失败');
                }
            }
        });

        // 3. 打开新增窗口
        $('#btnAdd').click(function(){
            $('#previewImg').attr('src', '');
            $('#coverImgInput').val('');
            form.val('formVal', {
                "productId": "",
                "productName": "",
                "price": "",
                "status": "1"
            });

            layer.open({
                type: 1,
                title: '新增商品',
                area: ['500px', '600px'],
                content: $('#productForm')
            });
        });

        // 4. 提交保存
        form.on('submit(saveSubmit)', function(data){
            axios.post('http://localhost:8080/api/admin/product/save', data.field)
                .then(res => {
                    if(res.data.code === 200){
                        layer.closeAll();
                        layer.msg('保存成功', {icon: 1});
                        tableIns.reload();
                    }
                });
            return false;
        });

        // 5. 监听开关 (上下架)
        form.on('switch(statusSwitch)', function(obj){
            var status = obj.elem.checked ? 1 : 0;
            axios.post('http://localhost:8080/api/admin/product/status', {
                productId: this.value,
                status: status
            }).then(res => {
                layer.tips('状态已更新', obj.othis);
            });
        });

        // 6. 监听工具条 (编辑/删除)
        table.on('tool(productTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'del'){
                layer.confirm('确认删除该商品吗？', function(index){
                    axios.post('http://localhost:8080/api/admin/product/delete', {productId: data.productId})
                        .then(res => {
                            layer.msg('删除成功');
                            tableIns.reload();
                        });
                    layer.close(index);
                });
            } else if(obj.event === 'edit'){
                // 回显数据
                form.val('formVal', data);
                $('#previewImg').attr('src', data.coverImg);

                layer.open({
                    type: 1,
                    title: '编辑商品',
                    area: ['500px', '600px'],
                    content: $('#productForm')
                });
            }
        });

        // 预览大图
        window.previewImg = function(url) {
            layer.photos({
                photos: { "data": [{"src": url}] }
            });
        }
    });
</script>
</body>
</html>
