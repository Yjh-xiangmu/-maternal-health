<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 孕产妇健康管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        /* --- 1. 动态流动背景 --- */
        body {
            /* 梦幻的四色渐变 */
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. 玻璃拟态卡片 --- */
        .login-card {
            width: 420px;
            padding: 45px 40px;
            background: rgba(255, 255, 255, 0.85); /* 半透明白 */
            backdrop-filter: blur(15px); /* 强力磨砂 */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 标题样式 */
        .login-header { text-align: center; margin-bottom: 35px; }
        .login-title {
            color: #ff5ca0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(255, 92, 160, 0.2);
        }
        .login-subtitle { color: #888; font-size: 14px; margin-top: 8px; letter-spacing: 1px; }

        /* --- 3. 输入框美化 --- */
        .input-group { position: relative; margin-bottom: 25px; }

        .layui-input {
            height: 50px;
            border-radius: 25px;
            border: 1px solid #eee;
            background: rgba(255, 255, 255, 0.6);
            padding-left: 50px; /* 给图标留位置 */
            transition: all 0.3s;
            font-size: 15px;
        }

        .layui-input:focus {
            border-color: #ff85c0;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 133, 192, 0.15);
        }

        /* 输入框图标 */
        .input-icon {
            position: absolute;
            left: 20px;
            top: 15px;
            color: #aaa;
            font-size: 20px;
            z-index: 10;
            transition: color 0.3s;
        }
        .layui-input:focus + .input-icon,
        .layui-input:valid + .input-icon { color: #ff5ca0; }

        /* --- 4. 角色选择美化 --- */
        .role-box { text-align: center; margin-bottom: 25px; }
        .layui-form-radio>i:hover, .layui-form-radioed>i { color: #ff5ca0 !important; }

        /* --- 5. 登录按钮 --- */
        .login-btn {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            background: linear-gradient(to right, #ff85c0, #ff5ca0);
            border: none;
            font-size: 18px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(255, 92, 160, 0.35);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 92, 160, 0.45);
            opacity: 1;
        }
        .login-btn:active { transform: scale(0.98); }

        /* 底部链接 */
        .footer-links { text-align: center; font-size: 14px; color: #999; }
        .footer-links a { color: #ff5ca0; text-decoration: none; font-weight: bold; transition: opacity 0.2s; }
        .footer-links a:hover { opacity: 0.8; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="login-title"><i class="fa fa-heartbeat"></i> 孕妈守护</div>
        <div class="login-subtitle">全周期健康管理系统</div>
    </div>

    <form class="layui-form">

        <div class="input-group">
            <i class="fa fa-mobile input-icon"></i>
            <input type="text" name="username" required lay-verify="required" placeholder="请输入手机号/账号" class="layui-input">
        </div>

        <div class="input-group">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" name="password" required lay-verify="required" placeholder="请输入登录密码" class="layui-input">
        </div>

        <div class="role-box">
            <input type="radio" name="role" value="0" title="我是孕妈" checked>
            <input type="radio" name="role" value="1" title="医生工作台">
            <input type="radio" name="role" value="2" title="管理员后台">
        </div>

        <button class="login-btn" lay-submit lay-filter="login">立即登录</button>

        <div class="footer-links">
            还没有账号？ <a href="register.html">立即注册新账号</a>
        </div>
    </form>
</div>

<script src="https://cdn.staticfile.org/layui/2.9.11/layui.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>
<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;

        // 登录逻辑
        form.on('submit(login)', function(data){
            var loading = layer.load(2, {shade: [0.1,'#fff']});

            // role字段转数字
            data.field.role = parseInt(data.field.role);

            axios.post('http://localhost:8080/api/auth/login', data.field)
                .then(res => {
                    layer.close(loading);
                    if(res.data.code === 200){
                        localStorage.setItem('user', JSON.stringify(res.data.data));

                        layer.msg('登录成功，欢迎回来！', {icon: 1, time: 1000}, function(){
                            // 根据角色跳转
                            var role = res.data.data.role;
                            if(role === 0) {
                                window.location.href = 'index_pregnant.html';
                            } else if(role === 1) {
                                window.location.href = 'index_doctor.html'; // ★★★ 改成这样，直接跳转！
                            } else if(role === 2) {
                                window.location.href = 'index_admin.html';
                            }

                        });
                    } else {
                        layer.msg(res.data.msg || '账号或密码错误', {icon: 2, anim: 6});
                    }
                })
                .catch(err => {
                    layer.close(loading);
                    layer.msg('服务器连接失败', {icon: 2});
                });
            return false;
        });
    });
</script>
</body>
</html>
