<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>医生管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <style>body{padding: 15px;}</style>
</head>
<body>

<div class="layui-card">
    <div class="layui-card-body">
        <button class="layui-btn layui-bg-blue" id="addDoctorBtn">
            <i class="layui-icon">&#xe654;</i> 新增医生
        </button>
        <span class="layui-word-aux" style="margin-left:10px;">默认初始密码为 123456</span>
    </div>
</div>

<table id="doctorTable" lay-filter="doctorTable"></table>

<script type="text/html" id="statusTpl">
    <input type="checkbox" name="status" value="{{d.userId}}" lay-skin="switch" lay-text="在职|禁用" lay-filter="statusSwitch" {{ d.status == 1 ? 'checked' : '' }}>
</script>

<script type="text/html" id="toolBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<div id="addForm" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="docForm">
        <input type="hidden" name="userId">

        <div class="layui-form-item">
            <label class="layui-form-label">姓名</label>
            <div class="layui-input-block">
                <input type="text" name="realName" required lay-verify="required" placeholder="医生真实姓名" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">手机号</label>
            <div class="layui-input-block">
                <input type="text" name="username" id="phoneInput" required lay-verify="phone" placeholder="作为登录账号" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">科室</label>
            <div class="layui-input-block">
                <select name="department">
                    <option value="产科">产科</option>
                    <option value="妇科">妇科</option>
                    <option value="营养科">营养科</option>
                    <option value="心理咨询">心理咨询</option>
                    <option value="新生儿科">新生儿科</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">职称</label>
            <div class="layui-input-block">
                <select name="title">
                    <option value="主任医师">主任医师</option>
                    <option value="副主任医师">副主任医师</option>
                    <option value="主治医师">主治医师</option>
                    <option value="护士长">护士长</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">简介</label>
            <div class="layui-input-block">
                <textarea name="introduction" placeholder="擅长领域及个人介绍" class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: right;">
            <button class="layui-btn" lay-submit lay-filter="submitForm">立即提交</button>
        </div>
    </form>
</div>

<script src="https://cdn.staticfile.org/layui/2.9.11/layui.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>

<script>
    layui.use(['table', 'layer', 'form'], function(){
        var table = layui.table, layer = layui.layer, form = layui.form, $ = layui.$;
        var isEdit = false;

        var tableIns = table.render({
            elem: '#doctorTable',
            url: 'http://localhost:8080/api/admin/doctor/list',
            cols: [[
                {field: 'userId', title: 'ID', width: 60},
                {field: 'realName', title: '姓名', width: 100, style:'font-weight:bold;'},
                {field: 'username', title: '手机号', width: 120},
                {field: 'department', title: '科室', width: 100, sort: true},
                {field: 'title', title: '职称', width: 120},
                {field: 'consultCount', title: '接诊数', width: 100, sort: true},
                {field: 'status', title: '状态', width: 100, templet: '#statusTpl', align:'center'},
                {title: '操作', width: 150, toolbar: '#toolBar', align:'center'}
            ]],
            page: false
        });

        // 新增
        $('#addDoctorBtn').click(function(){
            isEdit = false;
            $('#addForm')[0].reset();
            $('#phoneInput').removeAttr('readonly').removeClass('layui-disabled');
            form.render();
            layer.open({ type: 1, title: '👩‍⚕️ 添加新医生', area: ['500px', '550px'], content: $('#addForm') });
        });

        // 工具条：编辑/删除
        table.on('tool(doctorTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'del'){
                layer.confirm('确认删除？', function(index){
                    axios.post('http://localhost:8080/api/admin/doctor/delete', {userId: data.userId}).then(res => {
                        layer.msg('删除成功'); tableIns.reload();
                    });
                    layer.close(index);
                });
            } else if(obj.event === 'edit'){
                isEdit = true;
                form.val('docForm', data);
                $('#phoneInput').attr('readonly', 'readonly').addClass('layui-disabled');
                layer.open({ type: 1, title: '📝 编辑医生', area: ['500px', '550px'], content: $('#addForm') });
            }
        });

        // 状态开关
        form.on('switch(statusSwitch)', function(obj){
            axios.post('http://localhost:8080/api/admin/doctor/status', {
                userId: this.value, status: obj.elem.checked ? 1 : 0
            }).then(res => { layer.tips('状态已更新', obj.othis); });
        });

        // 提交
        form.on('submit(submitForm)', function(data){
            var url = isEdit ? 'http://localhost:8080/api/admin/doctor/update' : 'http://localhost:8080/api/admin/doctor/add';
            axios.post(url, data.field).then(res => {
                if(res.data.code === 200){
                    layer.closeAll(); layer.msg('操作成功', {icon: 1}); tableIns.reload();
                } else { layer.msg(res.data.msg, {icon: 2}); }
            });
            return false;
        });
    });
</script>
</body>
</html>
