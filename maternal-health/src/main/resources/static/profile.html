<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            font-family: "Microsoft YaHei";
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .container { max-width: 1000px; margin: 0 auto; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }

        .profile-side {
            text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.5); height: 100%;
        }
        .avatar-box {
            width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; padding: 5px;
            background: linear-gradient(to right, #ff5ca0, #ffc3a0);
            box-shadow: 0 5px 15px rgba(255, 92, 160, 0.3);
        }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; object-fit: cover; }
        .user-name { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .user-role { font-size: 14px; color: #ff5ca0; background: #fff0f5; padding: 2px 10px; border-radius: 10px; }

        .profile-content { padding: 30px 40px; }
        .layui-tab-brief > .layui-tab-title .layui-this { color: #ff5ca0 !important; }
        .layui-tab-brief > .layui-tab-more li.layui-this:after, .layui-tab-brief > .layui-tab-title .layui-this:after { border-bottom: 2px solid #ff5ca0; }

        .layui-form-label { width: 100px; color: #666; }
        .layui-input-block { margin-left: 130px; }
        .layui-input { border-radius: 10px; background: #f9f9f9; border: 1px solid #eee; }
        .layui-input:focus { border-color: #ff5ca0; background: #fff; }

        .save-btn {
            background: linear-gradient(to right, #ff5ca0, #ff85c0);
            border: none; border-radius: 20px; padding: 0 30px; height: 40px; line-height: 40px;
            box-shadow: 0 5px 15px rgba(255, 92, 160, 0.3); transition: transform 0.2s;
        }
        .save-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #666; font-size: 16px; cursor: pointer; z-index: 99; }
    </style>
</head>
<body>

<div class="container">
    <a href="index_pregnant.html" class="back-btn"><i class="fa fa-arrow-left"></i> 返回首页</a>

    <div class="layui-row glass-card">
        <div class="layui-col-md4 profile-side">
            <div class="avatar-box">
                <img src="https://cdn-icons-png.flaticon.com/512/4603/4603681.png">
            </div>
            <h2 class="user-name" id="displayRealName">--</h2>
            <span class="user-role">普通用户</span>
            <p style="margin-top: 20px; color: #999; font-size: 13px;">
                <i class="fa fa-phone"></i> 账号：<span id="displayPhone">--</span>
            </p>
            <p style="margin-top: 5px; color: #999; font-size: 13px;">
                <i class="fa fa-clock-o"></i> 注册时间：<span id="displayDate">--</span>
            </p>
        </div>

        <div class="layui-col-md8 profile-content">
            <div class="layui-tab layui-tab-brief">
                <ul class="layui-tab-title">
                    <li class="layui-this">资料设置</li>
                    <li>安全中心</li>
                </ul>
                <div class="layui-tab-content" style="margin-top: 20px;">

                    <div class="layui-tab-item layui-show">
                        <form class="layui-form" lay-filter="infoForm">
                            <div class="layui-form-item">
                                <label class="layui-form-label">真实姓名</label>
                                <div class="layui-input-block"><input type="text" name="realName" required lay-verify="required" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">末次月经</label>
                                <div class="layui-input-block"><input type="text" name="lmpDate" id="lmpPicker" placeholder="用于计算孕周" class="layui-input" readonly></div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">预产期</label>
                                <div class="layui-input-block"><input type="text" name="eddDate" id="eddPicker" placeholder="自动计算" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">孕前体重(kg)</label>
                                <div class="layui-input-block"><input type="number" name="preWeight" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-input-block"><button class="layui-btn save-btn" lay-submit lay-filter="saveInfo">保存资料</button></div>
                            </div>
                        </form>
                    </div>

                    <div class="layui-tab-item">
                        <form class="layui-form">
                            <div class="layui-form-item">
                                <label class="layui-form-label">原密码</label>
                                <div class="layui-input-block"><input type="password" name="oldPass" required lay-verify="required" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">新密码</label>
                                <div class="layui-input-block"><input type="password" name="newPass" id="newPass" required lay-verify="required|pass" placeholder="6-20位" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">确认密码</label>
                                <div class="layui-input-block"><input type="password" required lay-verify="required|confirmPass" class="layui-input"></div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-input-block"><button class="layui-btn layui-bg-red save-btn" lay-submit lay-filter="savePass">修改密码</button></div>
                            </div>
                        </form>

                        <div style="margin-top: 50px; padding-top: 20px; border-top: 1px dashed #ffcccc;">
                            <h3 style="color:#ff4d4f; font-size:16px; margin-bottom:10px; font-weight:bold;">⚠ 危险区域</h3>
                            <p style="color:#999; font-size:13px; margin-bottom:15px;">注销后账号及数据将永久删除。</p>
                            <button type="button" class="layui-btn layui-btn-primary layui-border-red" onclick="deleteAccount()">
                                <i class="fa fa-trash"></i> 永久注销账号
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.staticfile.org/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.staticfile.org/layui/2.9.11/layui.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>

<script>
    var user = JSON.parse(localStorage.getItem('user'));
    if(!user) window.location.href = 'login.html';

    layui.use(['element', 'form', 'laydate', 'layer'], function(){
        var element = layui.element, form = layui.form, laydate = layui.laydate, layer = layui.layer;

        laydate.render({ elem: '#eddPicker' });
        laydate.render({
            elem: '#lmpPicker',
            done: function(value, date){
                if(value){
                    var lmp = new Date(value);
                    var edd = new Date(lmp.setDate(lmp.getDate() + 280));
                    var y = edd.getFullYear();
                    var m = (edd.getMonth() + 1).toString().padStart(2, '0');
                    var d = edd.getDate().toString().padStart(2, '0');
                    $('#eddPicker').val(y + '-' + m + '-' + d);
                    layer.msg('已自动推算预产期');
                }
            }
        });

        function loadData() {
            axios.get('http://localhost:8080/api/profile/info?userId=' + user.userId).then(res => {
                var u = res.data.data.user;
                var p = res.data.data.profile || {};
                $('#displayRealName').text(u.realName);
                $('#displayPhone').text(u.username);
                $('#displayDate').text(u.createTime ? u.createTime.split('T')[0] : '--');
                form.val('infoForm', {
                    "realName": u.realName, "lmpDate": p.lmpDate, "eddDate": p.eddDate, "preWeight": p.preWeight
                });
            });
        }
        loadData();

        form.on('submit(saveInfo)', function(data){
            data.field.userId = user.userId;
            axios.post('http://localhost:8080/api/profile/update', data.field).then(res => {
                if(res.data.code === 200){
                    layer.msg('保存成功', {icon: 1});
                    user.realName = data.field.realName;
                    localStorage.setItem('user', JSON.stringify(user));
                    loadData();
                }
            });
            return false;
        });

        form.verify({
            pass: [/^[\S]{6,20}$/, '密码必须6到20位'],
            confirmPass: function(value) { if(value !== $('#newPass').val()) return '密码不一致'; }
        });

        form.on('submit(savePass)', function(data){
            data.field.userId = user.userId;
            axios.post('http://localhost:8080/api/profile/password', data.field).then(res => {
                if(res.data.code === 200){
                    layer.alert('修改成功，请重新登录', function(){
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                    });
                } else { layer.msg(res.data.msg, {icon: 2}); }
            });
            return false;
        });

        // [新增] 注销逻辑
        window.deleteAccount = function() {
            layer.confirm('确定要注销吗？数据无法恢复！', {icon: 7, title: '警告'}, function(){
                axios.post('http://localhost:8080/api/profile/delete', {userId: user.userId}).then(res => {
                    if(res.data.code === 200) {
                        layer.msg('账号已注销', {icon: 1, time: 1500}, function(){
                            localStorage.removeItem('user');
                            window.location.href = 'login.html';
                        });
                    }
                });
            });
        }
    });
</script>
</body>
</html>
