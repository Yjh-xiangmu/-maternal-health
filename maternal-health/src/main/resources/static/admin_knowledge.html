<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>知识库管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.9.11/css/layui.css">
    <style>body{padding: 15px;}</style>
</head>
<body>

<div class="layui-card">
    <div class="layui-card-body">
        <button class="layui-btn layui-bg-blue" id="btnAdd">
            <i class="layui-icon">&#xe61f;</i> 发布新文章
        </button>
    </div>
</div>

<table id="kbTable" lay-filter="kbTable"></table>

<script type="text/html" id="toolBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>

<div id="kbForm" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="formVal">
        <input type="hidden" name="kbId">
        <div class="layui-form-item">
            <label class="layui-form-label">文章标题</label>
            <div class="layui-input-block">
                <input type="text" name="title" required lay-verify="required" placeholder="请输入标题" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分类</label>
            <div class="layui-input-block">
                <select name="category">
                    <option value="孕期营养">孕期营养</option>
                    <option value="产检科普">产检科普</option>
                    <option value="分娩知识">分娩知识</option>
                    <option value="产后护理">产后护理</option>
                    <option value="育儿指南">育儿指南</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">文章内容</label>
            <div class="layui-input-block">
                <textarea name="content" required lay-verify="required" placeholder="请输入文章正文..." class="layui-textarea" style="height: 300px;"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: right;">
            <button class="layui-btn" lay-submit lay-filter="saveSubmit">立即发布</button>
        </div>
    </form>
</div>

<script src="https://cdn.staticfile.org/layui/2.9.11/layui.js"></script>
<script src="https://cdn.staticfile.org/axios/1.6.8/axios.min.js"></script>

<script>
    layui.use(['table', 'form', 'layer'], function(){
        var table = layui.table;
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.$;

        var tableIns = table.render({
            elem: '#kbTable',
            url: 'http://localhost:8080/api/knowledge/list',
            cols: [[
                {field: 'kbId', title: 'ID', width: 60, sort: true},
                {field: 'category', title: '分类', width: 120, sort: true},
                {field: 'title', title: '标题', width: 300},
                {field: 'viewCount', title: '阅读量', width: 100, sort: true},
                {field: 'createTime', title: '发布时间', width: 180},
                {title: '操作', width: 150, toolbar: '#toolBar', align:'center'}
            ]],
            page: true
        });

        // 发布按钮
        $('#btnAdd').click(function(){
            form.val('formVal', { "kbId": "", "title": "", "content": "" });
            layer.open({
                type: 1,
                title: '发布科普文章',
                area: ['700px', '600px'],
                content: $('#kbForm')
            });
        });

        // 提交
        form.on('submit(saveSubmit)', function(data){
            axios.post('http://localhost:8080/api/knowledge/save', data.field)
                .then(res => {
                    if(res.data.code === 200){
                        layer.closeAll();
                        layer.msg('发布成功', {icon: 1});
                        tableIns.reload();
                    }
                });
            return false;
        });

        // 工具条
        table.on('tool(kbTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'del'){
                layer.confirm('确认删除？', function(index){
                    axios.post('http://localhost:8080/api/knowledge/delete', {id: data.kbId})
                        .then(res => {
                            layer.msg('删除成功');
                            tableIns.reload();
                        });
                    layer.close(index);
                });
            } else if(obj.event === 'edit'){
                form.val('formVal', data);
                layer.open({
                    type: 1,
                    title: '编辑文章',
                    area: ['700px', '600px'],
                    content: $('#kbForm')
                });
            }
        });
    });
</script>
</body>
</html>
